name: Tag release image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Parse version
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          SHORT_HASH=$(git rev-parse --short=7 "${TAG_NAME}^{commit}")
          echo "short_hash=${SHORT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Install crane
        uses: buildpacks/github-actions/setup-tools@8fe5c9d7f5a3fa22d4b7cc7d50ba8ebd7eddf414 # v5.12.4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag snapshot image as release version and latest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHORT_HASH: ${{ steps.version.outputs.short_hash }}
        run: |
          SNAPSHOT_TAG="${VERSION}-${SHORT_HASH}-snapshot"
          REPO="ghcr.io/${{ github.repository }}"
          echo "Tagging ${SNAPSHOT_TAG} as ${VERSION} and latest"
          crane tag "${REPO}:${SNAPSHOT_TAG}" "${VERSION}"
          crane tag "${REPO}:${SNAPSHOT_TAG}" "latest"
