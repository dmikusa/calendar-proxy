name: Bump version after release

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Bump patch version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"//; s/".*//')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEXT}\"/" Cargo.toml
          echo "Bumped ${CURRENT} → ${NEXT}"

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          BRANCH="bump-version-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version after ${TAG_NAME}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: bump version after ${TAG_NAME}" \
            --body "Automated version bump following the \`${TAG_NAME}\` release." \
            --label dependencies)
          gh pr merge --auto --squash "$PR_URL"
